services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: project-ares-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_ares}
      POSTGRES_USER: ${POSTGRES_USER:-ares}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ares}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ares} -d ${POSTGRES_DB:-project_ares}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: project-ares-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ares:ares@postgres:5432/project_ares}
      ARES_CORS_ORIGINS: ${ARES_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ARES_GENERATION_PROVIDER: ${ARES_GENERATION_PROVIDER:-stub}
      ARES_MODEL: ${ARES_MODEL:-claude-haiku-4-5-20251015}
      ARES_EMBEDDING_PROVIDER: ${ARES_EMBEDDING_PROVIDER:-stub}
      ARES_WORLD_BIBLE_PATH: ${ARES_WORLD_BIBLE_PATH:-/app/world_bible.md}
      ARES_DB_BOOTSTRAP: ${ARES_DB_BOOTSTRAP:-create_all}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: project-ares-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5180:5173"
    depends_on:
      - backend
